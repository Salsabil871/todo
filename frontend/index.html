<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <div class="logo">✅</div>
        <h1>TodoMaster</h1>
        <p>Stay organized, stay productive</p>
      </div>

      <div class="tab-switcher">
        <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
        <button class="tab-btn" id="registerTab" onclick="showTab('register')">Register</button>
      </div>

      <div class="message-box" id="messageBox" style="display:none;"></div>

      <div id="loginForm">
        <div class="form-group">
          <label for="loginEmail">Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Your password" required />
        </div>
        <button class="btn btn-primary" onclick="loginWithEmail()">Login</button>
      </div>

      <div id="registerForm" style="display:none;">
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="regPassword">Password</label>
          <input type="password" id="regPassword" placeholder="At least 6 characters" required />
        </div>
        <button class="btn btn-primary" onclick="registerWithEmail()">Create Account</button>
      </div>

      <div class="divider"><span>or</span></div>

      <button class="btn btn-google" onclick="loginWithGoogle()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" width="20" />
        Continue with Google
      </button>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase.js"></script>
  <script src="auth.js"></script>
</body>

</html>
